<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a8">
<title>📅 ปฏิทินลงเวลา - ร้านเกิดการเกษตร</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0a8; --primary-hover: #097; --accent: #f0a500;
  --success: #0a8; --warning: #f39c12; --danger: #e74c3c; --info: #3498db;
  --bg-app: #f8f9fa; --bg-card: #ffffff; --bg-hover: #f0f1f3; --bg-input: #f8f9fa;
  --text-primary: #1a1f24; --text-secondary: #5a6168; --text-muted: #9098a0;
  --text-inverse: #ffffff; --border: #e8eaed; --border-strong: #d0d4d8;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12); --shadow-xl: 0 16px 48px rgba(0,0,0,0.16);
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
}
[data-theme="dark"] {
  --bg-app: #0f1419; --bg-card: #1a1f24; --bg-hover: #232932; --bg-input: #232932;
  --text-primary: #e6e8eb; --text-secondary: #b0b6bd; --text-muted: #707880;
  --border: #2a3038; --border-strong: #3a414a;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3); --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5); --shadow-xl: 0 16px 48px rgba(0,0,0,0.6);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
*, *::before, *::after { transition: background-color 0.2s, border-color 0.2s, color 0.2s; }
body {
  font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg-app); color: var(--text-primary); min-height: 100vh;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
.app-container { max-width: 1100px; margin: 0 auto; padding: 24px; }
.page-header { margin-bottom: 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
.page-header h1 { font-size: 24px; font-weight: 700; margin: 0; color: var(--text-primary); }
.page-header .header-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-left: auto; }
.month-nav { display: flex; align-items: center; gap: 8px; }
.month-nav button {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 6px 12px; cursor: pointer; color: var(--text-primary); font-size: 14px; font-weight: 500;
}
.month-nav button:hover { background: var(--bg-hover); }
.month-nav .month-label { font-size: 16px; font-weight: 600; min-width: 150px; text-align: center; }
select, input, textarea, button { font-family: inherit; }
select.emp-select {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-input); color: var(--text-primary); font-size: 14px; min-width: 160px;
}
select.emp-select:focus { outline: none; border-color: var(--primary); }
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; font-size: 13px; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
.calendar-wrapper {
  background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border);
  box-shadow: var(--shadow-sm); overflow: hidden;
}
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
.calendar-header-cell {
  padding: 10px 6px; text-align: center; font-weight: 600; font-size: 13px;
  color: var(--text-secondary); background: var(--bg-hover); border-bottom: 1px solid var(--border);
}
.calendar-day {
  min-height: 100px; padding: 6px; border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border); cursor: pointer; position: relative; background: var(--bg-card);
}
.calendar-day:nth-child(7n) { border-right: none; }
.calendar-day.other-month { background: var(--bg-app); opacity: 0.5; cursor: default; }
.calendar-day.weekend { background: #f0f7ff; }
[data-theme="dark"] .calendar-day.weekend { background: #1a2535; }
.calendar-day.locked { cursor: not-allowed; opacity: 0.75; }
.calendar-day:hover:not(.other-month):not(.locked) { background: var(--bg-hover); }
.day-number { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: var(--text-primary); }
.day-badge {
  display: inline-block; font-size: 11px; padding: 1px 5px; border-radius: 3px;
  margin: 1px 0; white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis;
}
.day-badge.att-pair { background: #d4edda; color: #155724; }
.day-badge.att-half { background: #fff3cd; color: #856404; }
.day-badge.att-miss { background: #f8d7da; color: #721c24; }
.day-badge.advance { background: #cce5ff; color: #004085; }
.day-badge.edited { background: #e8daef; color: #6c3483; }
.day-badge.lock-badge { background: #e2e3e5; color: #383d41; }
[data-theme="dark"] .day-badge.att-pair { background: rgba(21,87,36,0.3); color: #81c784; }
[data-theme="dark"] .day-badge.att-half { background: rgba(133,100,4,0.3); color: #ffd54f; }
[data-theme="dark"] .day-badge.att-miss { background: rgba(114,28,36,0.3); color: #ef9a9a; }
[data-theme="dark"] .day-badge.advance { background: rgba(0,64,133,0.3); color: #64b5f6; }
[data-theme="dark"] .day-badge.edited { background: rgba(108,52,131,0.3); color: #ce93d8; }
[data-theme="dark"] .day-badge.lock-badge { background: rgba(56,61,65,0.3); color: #b0b6bd; }
.day-logs { font-size: 11px; line-height: 1.3; margin-top: 2px; color: var(--text-secondary); }
.day-log-entry { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.click-hint { position: absolute; bottom: 4px; right: 6px; font-size: 10px; color: var(--text-muted); opacity: 0.6; }
.btn {
  padding: 8px 16px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background 0.15s, box-shadow 0.15s;
}
.btn-primary { background: var(--primary); color: #fff; box-shadow: var(--shadow-sm); }
.btn-primary:hover { background: var(--primary-hover); box-shadow: var(--shadow-md); }
.btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-hover); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #c0392b; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: var(--primary-hover); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.modal {
  display: none; position: fixed; inset: 0; background: rgba(15,20,25,0.55);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 1000;
  justify-content: center; align-items: center; padding: 20px;
}
.modal.active { display: flex; }
.modal-content {
  background: var(--bg-card); border-radius: var(--radius-xl); padding: 28px;
  width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-xl); position: relative; border: 1px solid var(--border);
}
.modal h2 { font-size: 20px; font-weight: 700; margin: 0 0 16px 0; color: var(--text-primary); }
.modal-close {
  position: absolute; top: 16px; right: 20px; font-size: 24px; cursor: pointer;
  color: var(--text-muted); background: none; border: none; line-height: 1;
}
.modal-close:hover { color: var(--text-primary); }
.modal-footer { margin-top: 20px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.log-entry {
  padding: 10px 12px; margin-bottom: 8px; border: 1px solid var(--border);
  border-radius: var(--radius-md); background: var(--bg-app); display: flex;
  flex-wrap: wrap; align-items: center; gap: 8px;
}
.log-entry .log-info { flex: 1; min-width: 180px; }
.log-entry .log-info strong { font-size: 15px; }
.log-entry .log-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.log-entry .log-actions { display: flex; gap: 4px; }
.log-edit-history {
  margin-top: 6px; padding: 6px 10px; background: var(--bg-card);
  border-radius: var(--radius-sm); font-size: 12px; color: var(--text-secondary);
  border: 1px dashed var(--border);
}
.log-edit-history summary { cursor: pointer; font-weight: 500; color: var(--text-muted); }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); background: var(--bg-input); color: var(--text-primary); font-size: 14px;
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
.loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 16px; }
.error-msg { background: #f8d7da; color: #721c24; padding: 12px 16px; border-radius: var(--radius-md); margin-bottom: 16px; font-size: 14px; }
[data-theme="dark"] .error-msg { background: rgba(114,28,36,0.3); color: #ef9a9a; }
.toast {
  position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: var(--radius-md);
  color: #fff; font-size: 14px; font-weight: 500; box-shadow: var(--shadow-lg);
  z-index: 2000; opacity: 0; transform: translateY(10px); transition: opacity 0.3s, transform 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.info { background: var(--info); }
@media (max-width: 768px) {
  .app-container { padding: 12px; }
  .page-header { flex-direction: column; align-items: flex-start; }
  .page-header .header-controls { margin-left: 0; width: 100%; }
  .month-nav .month-label { min-width: 120px; }
  .calendar-day { min-height: 70px; padding: 4px; }
  .day-number { font-size: 14px; }
  .day-logs { font-size: 10px; }
  .log-entry { flex-direction: column; align-items: flex-start; }
  .modal-content { padding: 20px; max-height: 95vh; border-radius: var(--radius-lg); }
}
@media (max-width: 500px) {
  .calendar-day { min-height: 55px; }
  .day-number { font-size: 12px; }
  .day-badge { font-size: 10px; padding: 0 3px; }
  .click-hint { display: none; }
}
</style>
</head>
<body>
<div class="app-container">
  <div class="page-header">
    <h1>📅 ปฏิทินลงเวลา</h1>
    <div class="header-controls">
      <select class="emp-select" id="empSelect" onchange="changeEmp()"></select>
      <div class="month-nav">
        <button onclick="navigateMonth(-1)">◀</button>
        <span class="month-label" id="monthLabel"></span>
        <button onclick="navigateMonth(1)">▶</button>
        <button onclick="goToday()">📅 วันนี้</button>
      </div>
    </div>
  </div>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:#d4edda;"></span> ครบคู่</span>
    <span class="legend-item"><span class="legend-dot" style="background:#fff3cd;"></span> ครึ่งวัน</span>
    <span class="legend-item"><span class="legend-dot" style="background:#f8d7da;"></span> ขาด</span>
    <span class="legend-item"><span class="legend-dot" style="background:#cce5ff;"></span> เบิกล่วงหน้า</span>
    <span class="legend-item"><span class="legend-dot" style="background:#e8daef;"></span> แก้ไขแล้ว</span>
    <span class="legend-item"><span class="legend-dot" style="background:#e2e3e5;"></span> 🔒 Locked</span>
  </div>
  <div class="calendar-wrapper">
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
</div>

<!-- Modals -->
<div class="modal" id="dayModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('dayModal')">&times;</button>
    <h2 id="dayModalTitle">...</h2>
    <div id="dayModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('dayModal')">ปิด</button>
    </div>
  </div>
</div>
<div class="modal" id="editModal">
  <div class="modal-content" style="max-width:440px;">
    <button class="modal-close" onclick="closeModal('editModal')">&times;</button>
    <h2>แก้ไขลงเวลา</h2>
    <div class="form-group"><label>เวลา</label><input type="datetime-local" id="editTime"></div>
    <div class="form-group">
      <label>ประเภท</label>
      <select id="editType"><option value="check_in">🟢 เข้างาน</option><option value="check_out">🔴 ออกงาน</option></select>
    </div>
    <div class="form-group"><label>เหตุผลที่แก้ไข</label><textarea id="editReason" placeholder="ระบุเหตุผล..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('editModal')">ยกเลิก</button>
      <button class="btn btn-primary btn-sm" onclick="confirmEditLog()">💾 บันทึก</button>
    </div>
  </div>
</div>
<div class="modal" id="addModal">
  <div class="modal-content" style="max-width:440px;">
    <button class="modal-close" onclick="closeModal('addModal')">&times;</button>
    <h2>➕ เพิ่มลงเวลา</h2>
    <div class="form-group"><label>เวลา</label><input type="datetime-local" id="addTime"></div>
    <div class="form-group">
      <label>ประเภท</label>
      <select id="addType"><option value="check_in">🟢 เข้างาน</option><option value="check_out">🔴 ออกงาน</option></select>
    </div>
    <div class="form-group"><label>เหตุผล</label><textarea id="addReason" placeholder="ระบุเหตุผล..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('addModal')">ยกเลิก</button>
      <button class="btn btn-success btn-sm" onclick="confirmAddLog()">💾 บันทึก</button>
    </div>
  </div>
</div>
<div class="modal" id="deleteModal">
  <div class="modal-content" style="max-width:400px;">
    <button class="modal-close" onclick="closeModal('deleteModal')">&times;</button>
    <h2>🗑️ ลบรายการลงเวลา</h2>
    <p style="margin-bottom:12px;color:var(--text-secondary);">แน่ใจหรือไม่ว่าจะลบรายการนี้?</p>
    <div class="form-group"><label>เหตุผลที่ลบ</label><textarea id="deleteReason" placeholder="ระบุเหตุผล..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('deleteModal')">ยกเลิก</button>
      <button class="btn btn-danger btn-sm" onclick="confirmDeleteLog()">🗑️ ลบ</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ===== State =====
var THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
var THAI_DAYS = ['อา','จ','อ','พ','พฤ','ศ','ส'];
var curY, curM, curEmp = 'E001', employees = {}, calData = null;
var selDay = null, editId = null, delId = null;
(function(){ var d=new Date(); curY=d.getFullYear(); curM=d.getMonth(); })();

document.addEventListener('DOMContentLoaded', function(){ loadEmployees().then(loadCalendar); });

async function loadEmployees() {
  try {
    var r = await fetch('/api/employees');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var data = await r.json();
    // รองรับ 3 format: { employees: [] } | [] | { E001: {...} }
    var list = [];
    if (Array.isArray(data)) list = data;
    else if (data && Array.isArray(data.employees)) list = data.employees;
    else if (data && typeof data === 'object') list = Object.values(data);

    employees = {};
    var sel = document.getElementById('empSelect');
    sel.innerHTML = '';
    list.forEach(function(e) {
      if (!e || !e.emp_code) return;
      if (e.active === false) return; // ข้ามพนักงานที่ inactive
      employees[e.emp_code] = e;
      var o = document.createElement('option');
      o.value = e.emp_code;
      var label = (e.nickname || e.name || '') + ' (' + e.emp_code + ')';
      o.textContent = label;
      sel.appendChild(o);
    });

    if (sel.options.length === 0) {
      toast('ไม่พบพนักงาน active', 'error');
      return;
    }
    if (employees[curEmp]) sel.value = curEmp;
    else curEmp = sel.value;
  } catch (e) {
    console.error('loadEmployees:', e);
    toast('โหลดพนักงานไม่สำเร็จ: ' + e.message, 'error');
  }
}

function changeEmp(){ curEmp=document.getElementById('empSelect').value; loadCalendar(); }
function navigateMonth(d){ curM+=d; if(curM>11){curM=0;curY++;} if(curM<0){curM=11;curY--;} loadCalendar(); }
function goToday(){ var n=new Date(); curY=n.getFullYear(); curM=n.getMonth(); loadCalendar(); }

function updateLabel(){ document.getElementById('monthLabel').textContent=THAI_MONTHS[curM]+' '+curY; }

async function loadCalendar() {
  var grid=document.getElementById('calendarGrid');
  grid.innerHTML='<div class="loading">⏳ กำลังโหลด...</div>'; updateLabel();
  try {
    var ms=curY+'-'+String(curM+1).padStart(2,'0');
    var r=await fetch('/api/attendance/calendar?empCode='+encodeURIComponent(curEmp)+'&month='+ms);
    if(!r.ok){ var t=await r.text(); throw new Error('HTTP '+r.status+': '+t.slice(0,100)); }
    calData=await r.json(); renderCalendar();
  } catch(e){ console.error(e); grid.innerHTML='<div class="error-msg">❌ '+e.message+'</div>'; }
}

function renderCalendar() {
  var grid=document.getElementById('calendarGrid');
  var fd=new Date(curY,curM,1), ld=new Date(curY,curM+1,0), dim=ld.getDate(), sd=fd.getDay();
  var lbs=(calData&&calData.logs_by_date)||{}, abs=(calData&&calData.advances_by_date)||{}, lks=(calData&&calData.lock_by_date)||{};
  var html='';
  for(var i=0;i<7;i++) html+='<div class="calendar-header-cell">'+THAI_DAYS[i]+'</div>';
  var pmld=new Date(curY,curM,0).getDate(), pms=pmld-sd+1;
  for(var p=pms;p<=pmld;p++) html+='<div class="calendar-day other-month"><div class="day-number" style="color:var(--text-muted);">'+p+'</div></div>';
  var td=new Date(), ts=td.getFullYear()+'-'+String(td.getMonth()+1).padStart(2,'0')+'-'+String(td.getDate()).padStart(2,'0');
  for(var d=1;d<=dim;d++){
    var dobj=new Date(curY,curM,d), dow=dobj.getDay(), wk=(dow===0||dow===6);
    var dk=curY+'-'+String(curM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'), lk=!!lks[dk];
    var cls='calendar-day'; if(wk) cls+=' weekend'; if(lk) cls+=' locked';
    var logs=lbs[dk]||[], adv=abs[dk]||null;
    var badges='';
    if(!wk){
      var ci=logs.filter(function(l){return l.type==='check_in';});
      var co=logs.filter(function(l){return l.type==='check_out';});
      if(ci.length>0&&co.length>0&&ci.length===co.length) badges+='<span class="day-badge att-pair">✅ ครบคู่</span> ';
      else if(ci.length>0||co.length>0) badges+='<span class="day-badge att-half">⚠️ ครึ่งวัน</span> ';
      else badges+='<span class="day-badge att-miss">❌ ขาด</span> ';
    }
    if(adv) badges+='<span class="day-badge advance">💰 เบิก</span> ';
    if(lk) badges+='<span class="day-badge lock-badge">🔒</span> ';
    if(logs.some(function(l){return l.edit_history&&l.edit_history.length>0;})) badges+='<span class="day-badge edited">✏️</span> ';
    var prev='';
    if(logs.length>0){
      var ps=logs.slice(0,3).map(function(l){
        var t=l.recordTime?l.recordTime.slice(11,19):'??:??', ic=l.type==='check_in'?'🟢':'🔴';
        return '<div class="day-log-entry">'+ic+' '+t+'</div>';
      });
      prev='<div class="day-logs">'+ps.join('')+'</div>';
      if(logs.length>3) prev+='<div class="day-log-entry" style="color:var(--text-muted);">+'+(logs.length-3)+' เพิ่มเติม</div>';
    }
    var oc=lk?'':' onclick="openDayModal('+d+')"';
    html+='<div class="'+cls+'"'+oc+'>';
    html+='<div class="day-number">'+d+'</div>'+badges+prev;
    if(!lk&&!wk) html+='<div class="click-hint">👆</div>';
    html+='</div>';
  }
  var tc=sd+dim, rm=7-(tc%7);
  if(rm<7) for(var n=1;n<=rm;n++) html+='<div class="calendar-day other-month"><div class="day-number" style="color:var(--text-muted);">'+n+'</div></div>';
  grid.innerHTML=html;
}

function openDayModal(date){
  selDay={y:curY,m:curM,d:date};
  var dk=curY+'-'+String(curM+1).padStart(2,'0')+'-'+String(date).padStart(2,'0');
  var dobj=new Date(curY,curM,date), dn=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  document.getElementById('dayModalTitle').textContent='วัน'+dn[dobj.getDay()]+'ที่ '+date+' '+THAI_MONTHS[curM]+' '+curY;
  var lbs=(calData&&calData.logs_by_date)||{}, logs=lbs[dk]||[], lks=(calData&&calData.lock_by_date)||{}, lk=!!lks[dk];
  var body='<div style="margin-bottom:12px;">';
  body+='<span class="btn btn-success btn-sm" onclick="openAddModal(\'check_in\')"'+(lk?' style="opacity:0.5;pointer-events:none;"':'')+'>🟢 + เพิ่ม Check-in</span> ';
  body+='<span class="btn btn-danger btn-sm" onclick="openAddModal(\'check_out\')"'+(lk?' style="opacity:0.5;pointer-events:none;"':'')+'>🔴 + เพิ่ม Check-out</span>';
  if(lk) body+=' <span style="color:var(--text-muted);font-size:12px;">🔒 Locked — แก้ไขไม่ได้</span>';
  body+='</div>';
  if(logs.length===0) body+='<p style="color:var(--text-muted);padding:20px 0;text-align:center;">ไม่มีรายการลงเวลาในวันนี้</p>';
  else {
    body+='<div>';
    for(var i=0;i<logs.length;i++){
      var lg=logs[i], t=lg.recordTime?lg.recordTime.slice(0,19).replace('T',' '):'??';
      var ic=lg.type==='check_in'?'🟢':'🔴', tl=lg.type==='check_in'?'เข้างาน':'ออกงาน', sr=lg.source||'-';
      var he=lg.edit_history&&lg.edit_history.length>0;
      body+='<div class="log-entry"><div class="log-info">';
      body+='<strong>'+ic+' '+tl+'</strong> '+t;
      body+='<div class="log-meta">source: '+sr+' | verify_mode: '+(lg.verify_mode||'-');
      if(lg.device_serial_no) body+=' | serial: '+lg.device_serial_no;
      body+='</div>';
      if(he){
        body+='<details class="log-edit-history"><summary>📜 ประวัติแก้ไข ('+lg.edit_history.length+' ครั้ง)</summary>';
        for(var j=0;j<lg.edit_history.length;j++){
          var eh=lg.edit_history[j];
          body+='<div style="margin-top:4px;padding:4px 0;border-top:1px solid var(--border);">';
          body+='⏱ '+eh.recordTime+' | '+eh.type;
          if(eh.reason) body+=' | เหตุผล: '+eh.reason;
          if(eh.changed_by) body+=' | โดย: '+eh.changed_by;
          body+='</div>';
        }
        body+='</details>';
      }
      body+='</div>';
      if(!lk){
        body+='<div class="log-actions">';
        body+='<button class="btn btn-primary btn-xs btn-sm" onclick="openEditModal(\''+lg.id+'\',\''+(lg.recordTime||'')+'\',\''+lg.type+'\')">✏️</button> ';
        body+='<button class="btn btn-danger btn-xs btn-sm" onclick="openDeleteModal(\''+lg.id+'\')">🗑️</button>';
        body+='</div>';
      }
      body+='</div>';
    }
    body+='</div>';
  }
  document.getElementById('dayModalBody').innerHTML=body;
  openModal('dayModal');
}

function openEditModal(id,rt,typ){
  editId=id;
  document.getElementById('editTime').value=rt?rt.slice(0,16):'';
  document.getElementById('editType').value=typ;
  document.getElementById('editReason').value='';
  openModal('editModal');
}

async function confirmEditLog(){
  var time=document.getElementById('editTime').value, typ=document.getElementById('editType').value, reason=document.getElementById('editReason').value.trim();
  if(!time){ toast('กรุณาเลือกเวลา','error'); return; }
  if(!reason){ toast('กรุณาระบุเหตุผลที่แก้ไข','error'); return; }
  closeModal('editModal');
  try {
    var tzTime=time+':00+07:00';
    var r=await fetch('/api/attendance/'+editId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({recordTime:tzTime,type:typ,reason:reason})});
    var d=await r.json();
    if(r.ok&&d.ok){ toast('✅ แก้ไขสำเร็จ','success'); loadCalendar(); }
    else toast('❌ แก้ไขไม่สำเร็จ: '+(d.error||r.status),'error');
  } catch(e){ toast('❌ '+e.message,'error'); }
}

function openAddModal(t){
  addingType=t;
  document.getElementById('addTime').value='';
  document.getElementById('addType').value=t;
  document.getElementById('addReason').value='';
  openModal('addModal');
}

async function confirmAddLog(){
  var time=document.getElementById('addTime').value, typ=document.getElementById('addType').value, reason=document.getElementById('addReason').value.trim();
  if(!time){ toast('กรุณาเลือกเวลา','error'); return; }
  if(!reason){ toast('กรุณาระบุเหตุผล','error'); return; }
  if(!selDay){ toast('กรุณาเลือกวันก่อน','error'); return; }
  closeModal('addModal');
  try {
    var ds=selDay.y+'-'+String(selDay.m+1).padStart(2,'0')+'-'+String(selDay.d).padStart(2,'0');
    var tzTime=ds+'T'+time.slice(11,16)+':00+07:00';
    var r=await fetch('/api/attendance/manual',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({emp_code:curEmp,type:typ,ts:tzTime,reason:reason})});
    var d=await r.json();
    if(r.ok&&d.ok){ toast('✅ เพิ่มลงเวลาสำเร็จ','success'); loadCalendar(); }
    else toast('❌ '+((d.error||d.message)||'เพิ่มไม่สำเร็จ'),'error');
  } catch(e){ toast('❌ '+e.message,'error'); }
}

async function confirmDeleteLog(){
  var reason=document.getElementById('deleteReason').value.trim();
  if(!reason){ toast('กรุณาระบุเหตุผลที่ลบ','error'); return; }
  closeModal('deleteModal');
  try {
    var r=await fetch('/api/attendance/'+delId,{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason:reason})});
    var d=await r.json();
    if(r.ok&&d.ok){ toast('✅ ลบสำเร็จ','success'); loadCalendar(); }
    else toast('❌ ลบไม่สำเร็จ: '+(d.error||r.status),'error');
  } catch(e){ toast('❌ '+e.message,'error'); }

function openModal(id){ document.getElementById(id).classList.add('active'); }
function closeModal(id){ document.getElementById(id).classList.remove('active'); }

var toastTimer=null;
function toast(msg,type){
  type=type||'info';
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type+' show';
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ el.classList.remove('show'); },3000);
}
