<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="theme-color" content="#0a8855" />
<title>ติดตามงานซ่อม</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: linear-gradient(160deg, #e8f7ef 0%, #f5fff9 100%);
    color: #1a2e22;
    min-height: 100vh;
  }
  .app { max-width: 480px; margin: 0 auto; padding: 16px; }
  .topbar {
    background: linear-gradient(135deg, #0a8855 0%, #34c98f 100%);
    color: #fff; padding: 18px 16px; border-radius: 14px;
    margin-bottom: 14px; box-shadow: 0 4px 12px rgba(10,136,85,0.25);
  }
  .topbar h1 { font-size: 18px; }
  .topbar .jid { font-size: 12px; opacity: 0.9; margin-top: 4px; }
  .card { background: #fff; padding: 14px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
  .label { font-size: 12px; color: #999; margin-bottom: 4px; }
  .value { font-size: 16px; font-weight: 600; color: #1a2e22; }
  .timeline { display: flex; flex-direction: column; gap: 12px; }
  .step { display: flex; gap: 12px; align-items: flex-start; }
  .step-dot { width: 28px; height: 28px; border-radius: 50%; background: #e0e8e3; color: #999; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .step.done .step-dot { background: #0a8855; color: #fff; }
  .step.active .step-dot { background: #f59e0b; color: #fff; }
  .step-body { flex: 1; padding-top: 4px; }
  .step-title { font-weight: 600; font-size: 14px; }
  .step-time { font-size: 12px; color: #999; margin-top: 2px; }
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .photo-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; }
  .center { text-align: center; padding: 32px 16px; color: #999; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e0e8e3; border-top-color: #0a8855; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .badge-fixing { background: #fef3c7; color: #92400e; }
  .badge-done { background: #d1fae5; color: #065f46; }
  .badge-cancelled { background: #fee2e2; color: #991b1b; }
  .parts-list { font-size: 14px; }
  .parts-list .item { padding: 6px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
  .parts-list .item:last-child { border-bottom: none; }
  .alert { padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
  .alert-warn { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
  .alert-err { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
  .photo-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; cursor: pointer; }
  .photo-viewer img { max-width: 100%; max-height: 100%; border-radius: 8px; }
</style>
</head>
<body>
<div class="app">
  <div id="content">
    <div class="center"><div class="spinner"></div><div>กำลังโหลดข้อมูลงาน...</div></div>
  </div>
</div>

<script>
(() => {
  'use strict';

  function $(id) { return document.getElementById(id); }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function fmtDate(s) {
    if (!s) return '-';
    try {
      const d = new Date(s);
      return d.toLocaleDateString('th-TH', { day:'numeric', month:'short' }) + ' ' +
             d.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
    } catch(_) { return s; }
  }

  // หา jobId + token จาก URL
  const pathParts = location.pathname.split('/');
  const jobId = pathParts[pathParts.indexOf('track') + 1];
  const token = new URLSearchParams(location.search).get('token') || '';
  const root = $('content');

  if (!jobId) {
    root.innerHTML = '<div class="alert alert-err">ไม่พบเลขงาน</div>';
    return;
  }

  function openPhoto(url) {
    const v = document.createElement('div');
    v.className = 'photo-viewer';
    v.innerHTML = `<img src="${url}" alt="" />`;
    v.addEventListener('click', () => v.remove());
    document.body.appendChild(v);
  }

  function statusBadge(status) {
    const labels = { received:'รับเครื่องแล้ว', fixing:'กำลังซ่อม', done:'ซ่อมเสร็จ', delivered:'ส่งมอบแล้ว', approved:'ส่งมอบแล้ว', cancelled:'ยกเลิก' };
    const cls = ({ fixing:'badge-fixing', done:'badge-done', delivered:'badge-done', approved:'badge-done', cancelled:'badge-cancelled' })[status] || 'badge-fixing';
    return `<span class="badge ${cls}">${labels[status] || status}</span>`;
  }

  function timelineHtml(history, status) {
    const stages = [
      { key: 'received', label: '📥 รับเครื่อง' },
      { key: 'fixing',   label: '🔧 กำลังซ่อม' },
      { key: 'done',     label: '✅ ซ่อมเสร็จ' },
      { key: 'delivered',label: '🚚 ส่งมอบ' }
    ];
    if (status === 'cancelled') stages.push({ key: 'cancelled', label: '❌ ยกเลิก' });

    const order = ['received','fixing','done','delivered','approved','cancelled'];
    const curIdx = order.indexOf(status);

    return stages.map((s, i) => {
      const sIdx = order.indexOf(s.key);
      let cls = '';
      if (sIdx < curIdx) cls = 'done';
      else if (sIdx === curIdx) cls = 'active';
      const histItem = (history || []).find(h => h.status === s.key);
      return `<div class="step ${cls}">
        <div class="step-dot">${cls === 'done' ? '✓' : (i+1)}</div>
        <div class="step-body">
          <div class="step-title">${s.label}</div>
          ${histItem ? `<div class="step-time">${fmtDate(histItem.ts)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  async function load() {
    try {
      let url = '/api/customer-track/' + encodeURIComponent(jobId);
      if (token) url += '?token=' + encodeURIComponent(token);
      const r = await fetch(url, { credentials: 'include' });
      if (r.status === 403) {
        root.innerHTML = '<div class="alert alert-warn">⚠️ ลิงก์นี้ไม่ถูกต้อง — กรุณาสแกน QR ใหม่ หรือทักร้านในไลน์</div>';
        return;
      }
      if (!r.ok) {
        root.innerHTML = '<div class="alert alert-err">โหลดข้อมูลไม่สำเร็จ</div>';
        return;
      }
      const job = await r.json();
      render(job);
    } catch (e) {
      root.innerHTML = '<div class="alert alert-err">เกิดข้อผิดพลาด: ' + escapeHtml(e.message) + '</div>';
    }
  }

  function render(j) {
    const dev = j.device || {};
    const photos = j.photos || [];
    const parts = j.parts_used || [];

    let html = `
      <div class="topbar">
        <h1>🔧 งานซ่อมของคุณ</h1>
        <div class="jid">${escapeHtml(j.id)}</div>
        <div style="margin-top:8px;">${statusBadge(j.status)}</div>
      </div>

      <div class="card">
        <div class="label">เครื่อง</div>
        <div class="value">${escapeHtml((dev.brand||'') + ' ' + (dev.model||''))}</div>
        ${dev.problem_description ? `<div style="font-size:13px;color:#666;margin-top:6px;">อาการ: ${escapeHtml(dev.problem_description)}</div>` : ''}
      </div>

      <div class="card">
        <div class="label" style="margin-bottom:10px;">📋 สถานะงาน</div>
        <div class="timeline">${timelineHtml(j.status_history || [], j.status)}</div>
      </div>
    `;

    if (j.fixer_name) {
      html += `<div class="card"><div class="label">🔧 ช่างที่ซ่อม</div><div class="value">${escapeHtml(j.fixer_name)}</div></div>`;
    }

    if (parts.length > 0) {
      html += `<div class="card">
        <div class="label" style="margin-bottom:8px;">🔩 อะไหล่ที่เปลี่ยน (${parts.length} รายการ)</div>
        <div class="parts-list">`;
      parts.forEach(p => {
        html += `<div class="item"><span>${escapeHtml(p.name_tech || '-')}</span><span style="color:#666;">×${escapeHtml(p.qty)}</span></div>`;
      });
      html += `</div></div>`;
    }

    if (photos.length > 0) {
      html += `<div class="card">
        <div class="label" style="margin-bottom:8px;">📷 รูปภาพ (${photos.length} รูป)</div>
        <div class="photo-grid" id="photoGrid">`;
      photos.forEach(p => {
        const u = p.url || p.base64 || '';
        html += `<img src="${escapeHtml(u)}" data-url="${escapeHtml(u)}" alt="" />`;
      });
      html += `</div></div>`;
    }

    html += `<div style="text-align:center; padding:20px; font-size:12px; color:#999;">
      🌾 ร้านเกิดการเกษตร · 091-414-5767
    </div>`;

    root.innerHTML = html;
    document.querySelectorAll('#photoGrid img').forEach(img => {
      img.addEventListener('click', () => openPhoto(img.dataset.url));
    });
  }

  load();
})();
</script>
</body>
</html>
