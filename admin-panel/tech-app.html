<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a8855" />
<title>KKT SERVICE</title>
<!-- PWA: Add to Home Screen -->
<link rel="manifest" href="/tech-manifest.json" />
<link rel="apple-touch-icon" sizes="180x180" href="/tech-icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/tech-icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="KKT SERVICE" />
<meta name="mobile-web-app-capable" content="yes" />
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(160deg, #e8f7ef 0%, #f5fff9 100%);
    color: #1a2e22;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-bottom: 24px;
  }
  /* Sticky header */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: #0a8855;
    color: #fff;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .topbar .title {
    flex: 1;
    font-weight: 700;
    font-size: 16px;
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .topbar .sub {
    font-size: 12px;
    opacity: .9;
    font-weight: 500;
  }
  .topbar .iconbtn {
    background: rgba(255,255,255,0.18);
    color: #fff;
    border: none;
    width: 36px; height: 36px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .topbar .iconbtn:active { transform: scale(.95); }
  .commission-pill {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }

  .body { padding: 14px; flex: 1; }

  .card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 14px rgba(10, 136, 85, 0.08);
    padding: 14px;
    margin-bottom: 12px;
  }
  .card.compact { padding: 12px; }
  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: #0a8855;
    margin: 14px 4px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title .count {
    background: #d8ead9;
    color: #0a8855;
    border-radius: 999px;
    padding: 1px 8px;
    font-size: 12px;
    font-weight: 700;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    min-height: 56px;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .1s;
    font-family: inherit;
    padding: 0 14px;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: .55; cursor: not-allowed; }
  .btn-primary { background: #0a8855; color: #fff; box-shadow: 0 4px 12px rgba(10,136,85,.25); }
  .btn-secondary { background: #fff; color: #0a8855; border: 2px solid #0a8855; }
  .btn-warn { background: #e0941c; color: #fff; }
  .btn-danger { background: #d8633a; color: #fff; }
  .btn-ghost { background: transparent; color: #5a7a6b; border: 1px solid #c7d8cf; }
  .btn-sm { min-height: 40px; font-size: 14px; padding: 0 12px; }
  .btn + .btn { margin-top: 10px; }

  input[type="text"], input[type="tel"], input[type="number"], input[type="search"], textarea, select {
    width: 100%;
    min-height: 46px;
    padding: 10px 12px;
    font-size: 16px;
    border: 1px solid #c7d8cf;
    border-radius: 10px;
    background: #fafefb;
    font-family: inherit;
    margin-bottom: 10px;
    color: #1a2e22;
  }
  textarea { min-height: 80px; resize: vertical; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #0a8855; box-shadow: 0 0 0 3px rgba(10,136,85,.15); }
  label { display: block; font-size: 13px; color: #3a5547; margin-bottom: 4px; font-weight: 600; }
  label .req { color: #d8633a; }

  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #d8ead9;
    border-top-color: #0a8855;
    border-radius: 50%;
    animation: spin .9s linear infinite;
    margin: 16px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .center { text-align: center; }
  .muted { color: #5a7a6b; font-size: 13px; }
  .big-emoji { font-size: 56px; margin-bottom: 8px; }

  .alert {
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .alert-error { background: #fce8e0; color: #a23315; border: 1px solid #f0c4b0; }
  .alert-warn { background: #fff5dc; color: #7a5410; border: 1px solid #f0d99a; }
  .alert-info { background: #e0f0ff; color: #155488; border: 1px solid #b8d8f5; }
  .alert-success { background: #d8f0d8; color: #1a5e2c; border: 1px solid #a8d8a8; }

  /* Job card */
  .job-card {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(10,136,85,0.06);
    border-left: 4px solid #c7d8cf;
    cursor: pointer;
  }
  .job-card:active { transform: scale(.99); }
  .job-card .row1 {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 4px;
  }
  .job-card .jid {
    font-weight: 700; color: #0a8855; font-size: 14px;
  }
  .job-card .device {
    font-size: 15px; font-weight: 600; color: #1a2e22;
    margin-bottom: 2px;
  }
  .job-card .cust {
    font-size: 13px; color: #5a7a6b;
  }
  .job-card .row-bot {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 6px;
  }
  .job-card .com {
    font-size: 13px; color: #0a8855; font-weight: 600;
  }
  .job-card[data-status="received"] { border-left-color: #888; }
  .job-card[data-status="fixing"] { border-left-color: #e0941c; }
  .job-card[data-status="done"] { border-left-color: #2196f3; }
  .job-card[data-status="delivered"] { border-left-color: #9c27b0; }
  .job-card[data-status="approved"] { border-left-color: #0a8855; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-received { background:#eee; color:#555; }
  .badge-fixing { background:#fff3d6; color:#a06600; }
  .badge-done { background:#d8e6fa; color:#155488; }
  .badge-delivered { background:#ead6f5; color:#5e2188; }
  .badge-approved { background:#d8f0d8; color:#1a5e2c; }
  .badge-paid { background:#0a8855; color:#fff; }

  /* Timeline chips */
  .timeline {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding: 4px 0;
    margin: 8px 0;
  }
  .chip {
    flex-shrink: 0;
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 12px;
    background: #eee;
    color: #888;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .chip.active { background: #0a8855; color: #fff; font-weight: 600; }
  .chip.done { background: #d8ead9; color: #0a8855; }

  /* Photo grid */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }
  .photo-thumb {
    aspect-ratio: 1/1;
    background: #eee;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-thumb .lbl {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,.6), transparent);
    color: #fff;
    font-size: 10px;
    padding: 8px 4px 3px;
    text-align: center;
  }
  .photo-thumb .x {
    position: absolute;
    top: 2px; right: 2px;
    background: rgba(255,80,80,0.9);
    color: #fff;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: none;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* Photo viewer (fullscreen) */
  .viewer {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .viewer img { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 8px; }
  .viewer .vlabel { color: #fff; margin-top: 12px; font-size: 14px; }
  .viewer .vclose {
    position: absolute; top: 14px; right: 14px;
    background: rgba(255,255,255,0.2); color: #fff; border: none;
    width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer;
  }

  /* Camera modal */
  .cam-modal {
    position: fixed; inset: 0;
    background: #000;
    z-index: 900;
    display: flex; flex-direction: column;
  }
  .cam-modal .cam-header {
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .cam-modal .cam-header .iconbtn {
    background: rgba(255,255,255,0.18); color: #fff;
    border: none; width: 36px; height: 36px; border-radius: 10px;
    font-size: 18px; cursor: pointer;
  }
  .cam-modal .cam-body {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    background: #000;
    overflow: hidden;
  }
  .cam-modal video, .cam-modal img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .cam-modal .cam-foot {
    background: rgba(0,0,0,0.7);
    padding: 14px;
    display: flex; gap: 10px;
  }
  .cam-modal .cam-foot .btn { flex: 1; }
  .cam-label-row { padding: 10px 14px; background: rgba(0,0,0,0.6); }
  .cam-label-row select {
    width: 100%; margin: 0;
    background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.3);
  }
  .cam-label-row select option { color: #1a2e22; }

  /* Bottom sheet modal (parts picker) */
  .sheet {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 800;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .sheet-inner {
    background: #fff;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    border-radius: 16px 16px 0 0;
    display: flex; flex-direction: column;
  }
  .sheet-header {
    padding: 12px 14px;
    border-bottom: 1px solid #eee;
    display: flex; align-items: center; gap: 10px;
  }
  .sheet-header .title { flex:1; font-weight: 700; color: #0a8855; }
  .sheet-body { flex:1; overflow-y: auto; padding: 12px; }
  .sheet-foot { padding: 10px 14px; border-top: 1px solid #eee; }

  /* Parts list item */
  .part-item {
    background: #fafefb;
    border: 1px solid #e6efe9;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 8px;
  }
  .part-item .pname { font-weight: 600; font-size: 15px; }
  .part-item .psku { font-size: 11px; color: #5a7a6b; }
  .part-item .prow {
    display: flex; align-items: center; gap: 8px; margin-top: 6px;
  }
  .part-item .price { color: #0a8855; font-weight: 700; }
  .part-item .stock { font-size: 12px; color: #5a7a6b; }
  .part-item .qty-input {
    width: 60px; min-height: 36px;
    margin: 0; text-align: center;
  }
  .part-item .add-btn {
    margin: 0 0 0 auto;
    min-height: 36px;
    font-size: 14px;
    padding: 0 14px;
  }

  /* Selected parts list */
  .part-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    background: #fafefb;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 14px;
  }
  .part-row .pn { flex: 1; }
  .part-row .pq { color: #5a7a6b; }
  .part-row .pt { font-weight: 700; color: #0a8855; }
  .part-row .pdel {
    background: transparent; color: #d8633a; border: none;
    cursor: pointer; font-size: 16px; padding: 4px 6px;
  }

  .total-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0;
    font-size: 14px;
  }
  .total-row.big {
    font-size: 17px; font-weight: 700;
    border-top: 1px dashed #c7d8cf;
    padding-top: 10px; margin-top: 6px;
    color: #0a8855;
  }
  .com-row {
    background: #f5fff9;
    border: 1px solid #d8ead9;
    border-radius: 8px;
    padding: 10px;
    margin-top: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .com-row label { margin: 0; }
  .com-row input[type=number] { margin: 0; width: 80px; min-height: 36px; }
  .com-row .amt { margin-left: auto; font-weight: 700; color: #0a8855; }

  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  .hidden { display: none !important; }
  .footer { text-align: center; font-size: 11px; color: #8aa599; padding: 12px 0 6px; }

  .save-status {
    font-size: 11px;
    color: #5a7a6b;
    text-align: right;
    padding: 0 4px 4px;
    height: 16px;
  }
  .save-status.saving { color: #e0941c; }
  .save-status.saved { color: #0a8855; }
  .save-status.error { color: #d8633a; }
</style>
</head>
<body>
<div class="app" id="app">
  <div id="topbar"></div>
  <div class="body" id="content">
    <div class="center"><div class="spinner"></div><div class="muted">กำลังโหลด...</div></div>
  </div>
  <div class="footer">© <span id="year"></span> KKT SERVICE</div>
</div>

<script>
(() => {
  'use strict';

  // ---------- State ----------
  const state = {
    user: null,            // /auth/me payload
    me: null,              // /api/tech/me — emp + commission summary
    page: 'dashboard',     // dashboard|new|detail
    jobId: null,
    job: null,             // current job detail
    myJobs: [],
    pendingJobs: [],
    productsCache: [],     // last search result
    saveTimer: null,
    saveStatus: 'idle',    // idle|saving|saved|error
    cam: { stream: null, videoEl: null, label: 'รับเครื่อง', lastDataUrl: null, onSnap: null },
  };

  const $ = (id) => document.getElementById(id);
  const $$ = (sel) => document.querySelectorAll(sel);
  const root = $('content');
  const topbar = $('topbar');
  document.getElementById('year').textContent = new Date().getFullYear();

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function fmtMoney(n) {
    n = Number(n) || 0;
    return '฿' + n.toLocaleString('th-TH', { maximumFractionDigits: 0 });
  }
  function fmtDate(s) {
    if (!s) return '-';
    try {
      const d = new Date(s);
      return d.toLocaleDateString('th-TH', { day:'numeric', month:'short' }) + ' ' +
             d.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
    } catch(_) { return s; }
  }
  function statusLabel(s) {
    return ({
      received: 'รับแล้ว',
      fixing: 'กำลังซ่อม',
      done: 'ซ่อมเสร็จ',
      delivered: 'ส่งแล้ว',
      approved: 'อนุมัติ',
      paid: 'จ่ายแล้ว',
    })[s] || s || '-';
  }
  function statusBadge(s) {
    return `<span class="badge badge-${escapeHtml(s||'received')}">${escapeHtml(statusLabel(s))}</span>`;
  }

  async function api(path, opts = {}) {
    const r = await fetch(path, {
      credentials: 'include',
      headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
      ...opts,
    });
    let body = null;
    try { body = await r.json(); } catch (_) {}
    return { status: r.status, ok: r.ok, body };
  }

  function setLoading(msg = 'กำลังโหลด...') {
    root.innerHTML = `<div class="center"><div class="spinner"></div><div class="muted">${escapeHtml(msg)}</div></div>`;
  }
  function showError(msg, retryFn) {
    root.innerHTML = `
      <div class="card center">
        <div class="big-emoji">⚠️</div>
        <h3 style="margin:6px 0">เกิดข้อผิดพลาด</h3>
        <div class="alert alert-error">${escapeHtml(msg)}</div>
        ${retryFn ? '<button class="btn btn-primary" id="btnRetry">ลองอีกครั้ง</button>' : ''}
      </div>`;
    if (retryFn) $('btnRetry').addEventListener('click', retryFn);
  }
  function showNoPerm(msg) {
    topbar.innerHTML = '';
    root.innerHTML = `
      <div class="card center">
        <div class="big-emoji">🚫</div>
        <h3 style="margin:6px 0">ไม่มีสิทธิ์เข้าถึง</h3>
        <p class="muted">${escapeHtml(msg || 'คุณไม่มีสิทธิ์เข้าถึง KKT SERVICE')}</p>
      </div>`;
  }

  // ---------- Topbar ----------
  function renderTopbar(opts = {}) {
    const back = opts.back ? `<button class="iconbtn" id="btnBack" title="กลับ">‹</button>` : '';
    const title = opts.title || 'KKT SERVICE';
    const sub = opts.sub || '';
    const right = opts.right || '';
    topbar.innerHTML = `
      <div class="topbar">
        ${back}
        <div class="title">${escapeHtml(title)}${sub ? `<div class="sub">${escapeHtml(sub)}</div>` : ''}</div>
        ${right}
      </div>`;
    if (opts.back && $('btnBack')) {
      $('btnBack').addEventListener('click', opts.onBack || (() => navigate('dashboard')));
    }
  }

  // ---------- Camera ----------
  async function openCamera({ label = 'รับเครื่อง', labels = ['รับเครื่อง','ระหว่างซ่อม','ก่อนส่ง','อะไหล่','อื่น ๆ'], onSnap }) {
    state.cam.label = label;
    state.cam.onSnap = onSnap;

    const wrap = document.createElement('div');
    wrap.className = 'cam-modal';
    wrap.innerHTML = `
      <div class="cam-header">
        <button class="iconbtn" id="camClose">✕</button>
        <div style="flex:1;font-weight:600">📷 ถ่ายรูป</div>
      </div>
      <div class="cam-label-row">
        <select id="camLabel">
          ${labels.map(l => `<option value="${escapeHtml(l)}" ${l===label?'selected':''}>${escapeHtml(l)}</option>`).join('')}
        </select>
      </div>
      <div class="cam-body" id="camBody">
        <video id="camVid" playsinline muted autoplay></video>
      </div>
      <div class="cam-foot" id="camFoot">
        <button class="btn btn-primary" id="camSnap">📸 ถ่าย</button>
      </div>
    `;
    document.body.appendChild(wrap);

    const closeAll = () => {
      try { state.cam.stream && state.cam.stream.getTracks().forEach(t=>t.stop()); } catch(_){}
      state.cam.stream = null;
      state.cam.videoEl = null;
      wrap.remove();
    };
    $('camClose').addEventListener('click', closeAll);
    $('camLabel').addEventListener('change', (e) => { state.cam.label = e.target.value; });

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 1280 } },
        audio: false,
      });
      state.cam.stream = stream;
      const v = $('camVid');
      state.cam.videoEl = v;
      v.srcObject = stream;
      await v.play();
    } catch (err) {
      $('camBody').innerHTML = `<div style="color:#fff;padding:20px;text-align:center">
        ไม่สามารถเปิดกล้องได้<br><small>${escapeHtml(err.message || err.name || '')}</small>
      </div>`;
      $('camFoot').innerHTML = `<button class="btn btn-ghost" id="camCancel">ปิด</button>`;
      $('camCancel').addEventListener('click', closeAll);
      return;
    }

    $('camSnap').addEventListener('click', () => {
      const v = state.cam.videoEl;
      if (!v) return;
      const maxSide = 800;
      let w = v.videoWidth || 720, h = v.videoHeight || 720;
      const scale = Math.min(1, maxSide / Math.max(w, h));
      w = Math.round(w*scale); h = Math.round(h*scale);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(v, 0, 0, w, h);
      const dataUrl = c.toDataURL('image/jpeg', 0.75);
      state.cam.lastDataUrl = dataUrl;

      // preview
      try { state.cam.stream && state.cam.stream.getTracks().forEach(t=>t.stop()); } catch(_){}
      state.cam.stream = null;
      $('camBody').innerHTML = `<img src="${dataUrl}" alt="preview" />`;
      $('camFoot').innerHTML = `
        <button class="btn btn-ghost" id="camRetake">🔄 ถ่ายใหม่</button>
        <button class="btn btn-primary" id="camOk">✓ ใช้รูปนี้</button>
      `;
      $('camRetake').addEventListener('click', () => {
        wrap.remove();
        openCamera({ label: state.cam.label, labels, onSnap });
      });
      $('camOk').addEventListener('click', async () => {
        const lbl = state.cam.label;
        const data = dataUrl;
        closeAll();
        if (typeof onSnap === 'function') {
          await onSnap({ label: lbl, base64: data });
        }
      });
    });
  }

  // ---------- Photo viewer ----------
  function openPhotoViewer(photo, onDelete) {
    const v = document.createElement('div');
    v.className = 'viewer';
    v.innerHTML = `
      <button class="vclose" id="vClose">✕</button>
      <img src="${escapeHtml(photo.url || photo.base64 || '')}" alt="" />
      <div class="vlabel">${escapeHtml(photo.label || '')} • ${escapeHtml(fmtDate(photo.ts))}${photo.by?(' • '+escapeHtml(photo.by)):''}</div>
      ${onDelete ? '<button class="btn btn-danger" id="vDel" style="margin-top:14px;max-width:200px">🗑️ ลบรูปนี้</button>':''}

    document.body.appendChild(v);
    $('vClose').addEventListener('click', () => v.remove());
    if (onDelete && $('vDel')) {
      $('vDel').addEventListener('click', async () => {

  // ---------- Navigation ----------
  function navigate(page, params = {}) {
    state.page = page;
    state.jobId = params.jobId || null;
    if (page === 'dashboard') renderDashboard();
    else if (page === 'new') renderNewJob();
    else if (page === 'detail') renderDetail();
  }

  // ---------- Dashboard ----------
  async function renderDashboard() {
    const me = state.me || {};
    const emp = me.emp || me.employee || me;
    const empName = emp.name || emp.full_name || (state.user && state.user.displayName) || 'ช่าง';
    const empCode = emp.emp_code || emp.code || '';
    // Backend ส่ง me.commission_summary.current_month (canonical)
    // รองรับ field เก่า me.commission_this_month / me.commission.this_month ไว้ด้วย
    const summary = me.commission_summary || {};
    const com = summary.current_month != null ? summary.current_month
              : (me.commission_this_month != null ? me.commission_this_month
                : (me.commission && me.commission.this_month) || 0);
    const jobCount = summary.job_count_current_month != null ? summary.job_count_current_month : 0;

    renderTopbar({
      title: `คุณ ${empName}${empCode?` (${empCode})`:''}`,
      right: '<button class="iconbtn" id="btnMenu" title="เมนู" style="font-size:22px;">⋮</button>'
    });

    setLoading();

    let mine = [], pending = [];
    try {
      const [mRes, pRes] = await Promise.all([
        api('/api/tech/jobs?mine=true'),
        api('/api/tech/jobs?status=received'),
      ]);
      if (mRes.ok && mRes.body) mine = mRes.body.jobs || mRes.body.data || mRes.body || [];
      if (pRes.ok && pRes.body) pending = pRes.body.jobs || pRes.body.data || pRes.body || [];
      if (!Array.isArray(mine)) mine = [];
      if (!Array.isArray(pending)) pending = [];
      // pending ที่แสดง = received และยังไม่มีคนรับซ่อม (fixed_by ว่าง)
      pending = pending.filter(j => !j.fixed_by);
    } catch(e) {
      showError('โหลดงานไม่สำเร็จ: ' + e.message, () => renderDashboard());
      return;
    }

    state.myJobs = mine;
    state.pendingJobs = pending;

    root.innerHTML = `
      <!-- Commission card -->
      <div style="background:linear-gradient(135deg,#0a8855 0%,#34c98f 100%); color:#fff; padding:18px 16px; border-radius:14px; margin-bottom:14px; box-shadow:0 4px 12px rgba(10,136,85,0.25);">
        <div style="font-size:13px; opacity:.9; margin-bottom:4px;">💰 คอมเดือนนี้</div>
        <div style="font-size:32px; font-weight:800; line-height:1.1;">${fmtMoney(com)}</div>
        <div style="font-size:13px; opacity:.85; margin-top:4px;">${jobCount ? `จาก ${jobCount} งานที่อนุมัติแล้ว` : 'ยังไม่มีงานที่อนุมัติเดือนนี้'}</div>
      </div>

      <button class="btn btn-primary" id="btnNew" style="margin-bottom:14px">➕ รับเครื่องใหม่</button>

      <div class="section-title">📥 งานรอรับซ่อม <span class="count">${pending.length}</span></div>
      <div id="pendList">${pending.length ? pending.map(jobCardHtml).join('') : '<div class="card muted center">ไม่มีงานรอรับ</div>'}</div>

      <div class="section-title">📋 งานของคุณ <span class="count">${mine.length}</span></div>
      <div id="myList">${mine.length ? mine.map(jobCardHtml).join('') : '<div class="card muted center">ยังไม่มีงานของคุณ</div>'}</div>
    `;
    $('btnNew').addEventListener('click', () => navigate('new'));

    // Menu ⋮ — อยู่มุมขวาบน (ไกลนิ้วโป้ง — ไม่โดนบ่อย)
    const btnMenu = $('btnMenu');
    if (btnMenu) {
      btnMenu.addEventListener('click', (e) => {
        e.stopPropagation();
        showActionMenu();
      });
    }

    $$('#myList .job-card, #pendList .job-card').forEach(el => {
      el.addEventListener('click', () => navigate('detail', { jobId: el.dataset.id }));
    });
  }

  function showActionMenu() {
    // ปิด menu เก่าถ้ามี
    const old = document.getElementById('actionMenuOverlay');
    if (old) { old.remove(); return; }
    const ov = document.createElement('div');
    ov.id = 'actionMenuOverlay';
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9000;';
    const menu = document.createElement('div');
    menu.style.cssText = 'position:fixed;top:60px;right:14px;background:#fff;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.15);min-width:200px;z-index:9001;overflow:hidden;';
    menu.innerHTML = `
      <button id="miClockOut" style="width:100%;padding:14px 16px;border:none;background:transparent;text-align:left;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:10px;color:#dc2626;border-bottom:1px solid #f3f4f6;">
        🚪 ลงเวลาออกงาน
      </button>
      <button id="miLogout" style="width:100%;padding:14px 16px;border:none;background:transparent;text-align:left;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:10px;color:#666;">
        🔓 ออกจากระบบ (logout)
      </button>
    `;
    ov.addEventListener('click', () => { ov.remove(); menu.remove(); });
    document.body.appendChild(ov);
    document.body.appendChild(menu);
    document.getElementById('miClockOut').addEventListener('click', (e) => {
      e.stopPropagation();
      ov.remove(); menu.remove();
      if (confirm('✅ ยืนยันลงเวลาออกงาน?')) {
        location.href = '/attendance/scan?type=check_out';
      }
    });
    document.getElementById('miLogout').addEventListener('click', async (e) => {
      e.stopPropagation();
      ov.remove(); menu.remove();
      if (!confirm('🔓 ออกจากระบบ?\n(ต้อง LINE login ใหม่ครั้งหน้า)')) return;
      try {
        await fetch('/auth/logout', { method:'POST', credentials:'include' });
      } catch(_){}
      // clear local cache
      try { sessionStorage.clear(); localStorage.clear(); } catch(_){}
      location.href = '/admin/login';
    });
  }

  function jobCardHtml(j) {
    const dev = (j.device && (j.device.brand || '') + (j.device.model ? ' ' + j.device.model : '')) || '-';
    const cust = j.customer_name || '-';
    const com = j.commission_amount != null ? j.commission_amount : 0;
    const fixedBy = j.fixed_by || '';
    return `
      <div class="job-card" data-id="${escapeHtml(j.id)}" data-status="${escapeHtml(j.status||'received')}">
        <div class="row1">
          <span class="jid">${escapeHtml(j.id)}</span>
          ${statusBadge(j.status)}
        </div>
        <div class="device">${escapeHtml(dev)}</div>
        <div class="cust">${escapeHtml(cust)}${j.customer_phone?(' • '+escapeHtml(j.customer_phone)):''}</div>
        <div class="row-bot">
          <span class="muted">${fixedBy ? ('ช่าง: '+escapeHtml(fixedBy)) : 'ยังไม่รับซ่อม'}</span>
          ${com ? `<span class="com">คอม ${fmtMoney(com)}</span>` : ''}
        </div>
      </div>`;
  }

  // ---------- New Job ----------
  function renderNewJob() {
    renderTopbar({ title: 'รับเครื่องใหม่', back: true, onBack: () => navigate('dashboard') });

    // form state เก็บทุก field — ไม่หายตอนถ่ายรูป/rerender
    const formState = {
      cName: '', cPhone: '',
      dBrand: '', dModel: '', dSerial: '', dProblem: '',
      photos: []
    };

    function snapshotInputs() {
      ['cName','cPhone','dBrand','dModel','dSerial','dProblem'].forEach(id => {
        const el = $(id);
        if (el) formState[id] = el.value;
      });
    }

    function rerender() {
      const fs = formState;
      const photoCount = formState.photos.length;
      root.innerHTML = `
        <div class="card" style="background:#fffbeb;border:1px solid #fde68a;">
          <div style="color:#92400e;font-size:13px;line-height:1.5">
            ⚡ <b>จำเป็นแค่ อาการ + รูป</b><br>
            ข้อมูลอื่น ติดต่อลูกค้าได้ทีหลัง
          </div>
        </div>

        <div class="card">
          <div style="font-weight:700;color:#0a8855;margin-bottom:8px">📷 รูปเครื่อง <span class="req">*</span></div>
          <div class="photo-grid" id="photoGrid">
            ${formState.photos.map((p,i) => `
              <div class="photo-thumb">
                <img src="${p.base64}" />
                <div class="lbl">${escapeHtml(p.label||'')}</div>
                <button class="x" data-idx="${i}">✕</button>
              </div>
            `).join('')}
          </div>
          <button class="btn btn-secondary btn-sm" id="btnAddPhoto">${photoCount?'+ ถ่ายรูปเพิ่ม':'📷 ถ่ายรูปเครื่อง'}</button>
          ${!photoCount ? '<div style="font-size:12px;color:#dc2626;margin-top:6px">ต้องถ่ายรูปอย่างน้อย 1 รูป</div>' : ''}
        </div>

        <div class="card">
          <div style="font-weight:700;color:#0a8855;margin-bottom:8px">⚠️ อาการ <span class="req">*</span></div>
          <textarea id="dProblem" placeholder="เช่น สตาร์ทไม่ติด ไฟไม่เข้า เสียงดัง..." rows="3">${escapeHtml(fs.dProblem)}</textarea>
        </div>

        <details class="card" style="margin-bottom:14px">
          <summary style="font-weight:700;color:#0a8855;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px">
            <span>➕ ข้อมูลเพิ่มเติม (ไม่บังคับ)</span>
            <span style="color:#999;font-size:12px;font-weight:normal;margin-left:auto">ลูกค้า · รุ่น · Serial</span>
          </summary>
          <div style="margin-top:12px">
            <label>ชื่อลูกค้า</label>
            <input type="text" id="cName" placeholder="คุณสมชาย" value="${escapeHtml(fs.cName)}" />
            <label>เบอร์โทร</label>
            <input type="tel" id="cPhone" placeholder="081-xxx-xxxx" value="${escapeHtml(fs.cPhone)}" />
            <label>ยี่ห้อ</label>
            <input type="text" id="dBrand" placeholder="Honda / Stihl / ฯลฯ" value="${escapeHtml(fs.dBrand)}" />
            <label>รุ่น</label>
            <input type="text" id="dModel" placeholder="Wave 110" value="${escapeHtml(fs.dModel)}" />
            <label>Serial / เลขเครื่อง</label>
            <input type="text" id="dSerial" value="${escapeHtml(fs.dSerial)}" />
          </div>
        </details>

        <button class="btn btn-primary" id="btnSave">💾 บันทึกงานใหม่</button>
        <button class="btn btn-ghost" id="btnCancel">ยกเลิก</button>
      `;

      // sync input → state ระหว่างพิมพ์ (เผื่อ ถอด keyboard ปิดหรือ focus ออก)
      ['cName','cPhone','dBrand','dModel','dSerial','dProblem'].forEach(id => {
        const el = $(id);
        if (el) el.addEventListener('input', () => { formState[id] = el.value; });
      });

      $$('#photoGrid .x').forEach(b => {
        b.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = +b.dataset.idx;
          snapshotInputs();
          formState.photos.splice(idx, 1);
          rerender();
        });
      });

      $('btnAddPhoto').addEventListener('click', () => {
        snapshotInputs();  // เก็บที่กรอกไว้ก่อนเปิดกล้อง
        openCamera({
          label: 'รับเครื่อง',
          onSnap: ({ label, base64 }) => {
            formState.photos.push({ label, base64 });
            rerender();
          },
        });
      });

      $('btnCancel').addEventListener('click', () => navigate('dashboard'));
      $('btnSave').addEventListener('click', submit);
    }

    async function submit() {
      snapshotInputs();
      const customer_name = (formState.cName || '').trim();
      const customer_phone = (formState.cPhone || '').trim();
      const brand = (formState.dBrand || '').trim();
      const model = (formState.dModel || '').trim();
      const serial = (formState.dSerial || '').trim();
      const problem = (formState.dProblem || '').trim();

      // บังคับแค่ อาการ + รูป
      if (!problem) return alert('กรุณากรอกอาการของเครื่อง');
      if (!formState.photos.length) return alert('กรุณาถ่ายรูปเครื่องอย่างน้อย 1 รูป');

      $('btnSave').disabled = true;
      $('btnSave').textContent = 'กำลังบันทึก...';

      const payload = {
        customer_name, customer_phone,
        device: { brand, model, serial, problem_description: problem },
        photos: formState.photos,
      };

      const r = await api('/api/tech/jobs', { method: 'POST', body: JSON.stringify(payload) });
      if (r.ok && r.body && (r.body.id || (r.body.job && r.body.job.id))) {
        const id = r.body.id || r.body.job.id;
        navigate('detail', { jobId: id });
      } else {
        $('btnSave').disabled = false;
        $('btnSave').textContent = '💾 บันทึกงานใหม่';
        alert('บันทึกไม่สำเร็จ: ' + ((r.body && (r.body.error || r.body.message)) || `HTTP ${r.status}`));
      }
    }

    rerender();
  }

  // ---------- Job Detail ----------
  async function renderDetail() {
    renderTopbar({ title: state.jobId || 'งาน', back: true, onBack: () => navigate('dashboard') });
    setLoading();
    const r = await api('/api/tech/jobs/' + encodeURIComponent(state.jobId));
    if (!r.ok || !r.body) {
      showError('โหลดงานไม่สำเร็จ', () => renderDetail());
      return;
    }
    state.job = r.body.job || r.body;
    drawDetail();
  }

  function drawDetail() {
    const j = state.job || {};
    const myEmpCode = (state.me && (state.me.emp || state.me.employee || state.me).emp_code) || '';
    const isOwnJob = j.fixed_by === myEmpCode;
    const role = (state.user && state.user.role) || '';
    const isOwner = role === 'owner' || role === 'manager';

    const dev = j.device || {};
    const photos = Array.isArray(j.photos) ? j.photos : [];
    const parts = Array.isArray(j.parts_used) ? j.parts_used : [];

    const partsTotal = parts.reduce((s,p) => s + (Number(p.total)||(Number(p.unit_price)*Number(p.qty)||0)), 0);
    const labor = Number(j.labor_charge) || 0;
    const amount = partsTotal + labor;
    const comRate = j.commission_rate != null ? Number(j.commission_rate) : 30;
    const comAmt = Math.round(amount * comRate / 100);

    // Timeline chips
    const order = ['received','fixing','done','delivered','approved'];
    const curIdx = order.indexOf(j.status);
    const tlLabels = { received:'รับ', fixing:'ซ่อม', done:'เสร็จ', delivered:'ส่ง', approved:'อนุมัติ' };
    const timeline = order.map((s, i) => {
      const cls = i < curIdx ? 'done' : (i === curIdx ? 'active' : '');
      return `<span class="chip ${cls}">${escapeHtml(tlLabels[s])}</span>`;
    }).join('');

    // Action buttons
    let actions = '';
    if (j.status === 'received') {
      if (j.fixed_by && j.fixed_by !== myEmpCode) {
        actions = `<div class="alert alert-info">งานนี้ ${escapeHtml(j.fixed_by)} กำลังจะรับซ่อม</div>`;
      } else {
        actions = `<button class="btn btn-primary" id="btnStart">🔧 รับงานซ่อม</button>`;
      }
    } else if (j.status === 'fixing') {
      if (isOwnJob) actions = `<button class="btn btn-primary" id="btnDone">✅ ซ่อมเสร็จ</button>`;
      else actions = `<div class="alert alert-info">${escapeHtml(j.fixed_by||'-')} กำลังซ่อม</div>`;
    } else if (j.status === 'done') {
      actions = `<button class="btn btn-primary" id="btnDeliver">🚚 ส่งงานให้ลูกค้า</button>`;
    } else if (j.status === 'delivered') {
      actions = `<div class="alert alert-warn">⏳ รออนุมัติจาก Owner</div>`;
    } else if (j.status === 'approved') {
      actions = `<div class="alert alert-success">✅ อนุมัติแล้ว — รอเข้า payroll</div>`;
    } else if (j.status === 'paid') {
      actions = `<div class="alert alert-success">💰 จ่ายค่าคอมแล้ว</div>`;
    }

    // แก้ parts/labor ได้เฉพาะสถานะ fixing (ช่างตัวเอง) หรือ owner
    const editable = (j.status === 'fixing' && isOwnJob) || isOwner;

    root.innerHTML = `
      <div class="card compact">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <div style="font-weight:700;flex:1">สถานะ</div>
          ${statusBadge(j.status)}
        </div>
        <div class="timeline">${timeline}</div>
      </div>

      <div class="card">
        <div style="font-weight:700;color:#0a8855;margin-bottom:6px">👤 ลูกค้า</div>
        <div style="font-size:16px;font-weight:600">${escapeHtml(j.customer_name||'-')}</div>
        ${j.customer_phone ? `
          <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
            <span>📞 ${escapeHtml(j.customer_phone)}</span>
            <a class="btn btn-secondary btn-sm" style="margin:0 0 0 auto;width:auto" href="tel:${encodeURIComponent(j.customer_phone)}">โทร</a>
          </div>` : ''}
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid #eee">
          ${j.customer_line_id ? 
            '<div style="color:#0a8855;font-size:13px;">✅ ลูกค้าติดตามงานผ่าน LINE แล้ว</div>' : 
            '<button class="btn btn-secondary btn-sm" id="btnCustQr" style="width:auto;margin:0">📲 QR ลูกค้าติดตามงาน</button>'
          }
        </div>
      </div>

      <div class="card">
        <div style="font-weight:700;color:#0a8855;margin-bottom:6px">🏍️ เครื่อง</div>
        <div style="font-size:16px;font-weight:600">${escapeHtml((dev.brand||'') + (dev.model?(' '+dev.model):'')) || '-'}</div>
        ${dev.serial ? `<div class="muted">Serial: ${escapeHtml(dev.serial)}</div>`:''}
        ${dev.problem_description ? `<div style="margin-top:6px;color:#3a5547">อาการ: ${escapeHtml(dev.problem_description)}</div>`:''}
      </div>

      <div class="card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="font-weight:700;color:#0a8855;flex:1">📷 รูป (${photos.length})</div>
          ${editable ? '<button class="btn btn-secondary btn-sm" id="btnAddPhoto" style="width:auto;margin:0">+ เพิ่ม</button>':''}
        </div>
        <div class="photo-grid" id="photoGrid">
          ${photos.map((p,i) => `
            <div class="photo-thumb" data-idx="${i}">
              <img src="${escapeHtml(p.url || p.base64 || '')}" />
              <div class="lbl">${escapeHtml(p.label||'')}</div>
            </div>
          `).join('') || '<div class="muted" style="grid-column:1/-1;text-align:center">ยังไม่มีรูป</div>'}
        </div>
      </div>

      <div class="card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="font-weight:700;color:#0a8855;flex:1">🔧 อะไหล่ (${parts.length})</div>
          ${editable ? '<button class="btn btn-secondary btn-sm" id="btnPickParts" style="width:auto;margin:0">+ เลือกอะไหล่</button>':''}
        </div>
        <div id="partsList">
          ${parts.map((p,i) => `
            <div class="part-row">
              <div class="pn">${escapeHtml(p.name_tech || p.name || p.sku || '-')}</div>
              <div class="pq">× ${escapeHtml(p.qty)}</div>
              <div class="pt">${fmtMoney(p.total || (Number(p.unit_price)*Number(p.qty)))}</div>
              ${editable ? `<button class="pdel" data-idx="${i}">🗑️</button>` : ''}
            </div>
          `).join('') || '<div class="muted" style="text-align:center;padding:8px">ยังไม่มีอะไหล่</div>'}
        </div>
        <div class="total-row"><span>รวมอะไหล่</span><span>${fmtMoney(partsTotal)}</span></div>
      </div>

      <div class="card">
        <div style="font-weight:700;color:#0a8855;margin-bottom:8px">💵 ค่าแรง</div>
        <input type="number" id="laborInput" value="${labor}" inputmode="numeric" min="0" ${editable?'':'disabled'} placeholder="0" />
        <div class="total-row big"><span>💰 รวมเงิน</span><span>${fmtMoney(amount)}</span></div>
      </div>

      <div class="card">
        <div style="font-weight:700;color:#0a8855;margin-bottom:6px">📝 บันทึก</div>
        <textarea id="noteInput" ${editable?'':'disabled'} placeholder="หมายเหตุ...">${escapeHtml(j.note||'')}</textarea>
        <div class="save-status" id="saveStatus"></div>
      </div>

      <div id="actions">${actions}</div>
    `;

    // Photo viewer
    $$('#photoGrid .photo-thumb').forEach(el => {
      el.addEventListener('click', () => {
        const idx = +el.dataset.idx;
        const p = photos[idx];
        if (!p) return;
        const canDel = editable && (!p.by || p.by === myEmpCode || isOwner);
        openPhotoViewer(p, canDel ? () => deletePhoto(idx) : null);
      });
    });

    if (editable) {
      // Add photo
      const addBtn = $('btnAddPhoto');
      if (addBtn) addBtn.addEventListener('click', () => {
        openCamera({
          label: j.status === 'fixing' ? 'ระหว่างซ่อม' : (j.status === 'done' ? 'ก่อนส่ง' : 'รับเครื่อง'),
          onSnap: async ({ label, base64 }) => {
            updateSaveStatus('saving');
            const r = await api(`/api/tech/jobs/${encodeURIComponent(j.id)}/photos`, {
              method: 'POST',
              body: JSON.stringify({ label, base64 }),
            });
            if (r.ok) { updateSaveStatus('saved'); await renderDetail(); }
            else { updateSaveStatus('error'); alert('อัปโหลดไม่สำเร็จ'); }
          },
        });
      });

      // Pick parts
      const pickBtn = $('btnPickParts');
      if (pickBtn) pickBtn.addEventListener('click', openPartsPicker);

      // Delete part
      $$('#partsList .pdel').forEach(b => {
        b.addEventListener('click', async () => {
          const idx = +b.dataset.idx;
          if (!confirm('ลบอะไหล่นี้?')) return;
          const newParts = parts.slice();
          newParts.splice(idx, 1);
          state.job.parts_used = newParts;
          await saveJob({ parts_used: newParts });
          drawDetail();
        });
      });

      // Auto-save labor + note (commission_rate อ่านจาก employee setting ช่างแก้ไม่ได้)
      const onChange = () => {
        const newLabor = Number($('laborInput').value) || 0;
        const newNote = $('noteInput').value;
        const newPartsTotal = parts.reduce((s,p) => s + (Number(p.total)||0), 0);
        const newAmount = newPartsTotal + newLabor;

        state.job.labor_charge = newLabor;
        state.job.note = newNote;
        state.job.amount = newAmount;

        debouncedSave({ labor_charge: newLabor, note: newNote });
      };
      ['laborInput','noteInput'].forEach(id => {
        const el = $(id);
        if (el) el.addEventListener('input', onChange);
      });
    }

    // Customer QR — สร้าง token + แสดง QR
    const btnQr = $('btnCustQr');
    if (btnQr) btnQr.addEventListener('click', async () => {
      try {
        const r = await api(`/api/tech/jobs/${encodeURIComponent(j.id)}/customer-link-token`, { method: 'POST' });
        if (!r.ok || !r.body) return alert('สร้าง QR ไม่สำเร็จ');
        showCustomerQr(r.body, j.id);
      } catch (e) { alert(e.message); }
    });

    // Action handlers
    if ($('btnStart')) $('btnStart').addEventListener('click', () => doAction('start-fixing'));
    if ($('btnDone')) $('btnDone').addEventListener('click', () => {
      if (!confirm('ยืนยันว่าซ่อมเสร็จแล้ว?')) return;
      doAction('done');
    });
    if ($('btnDeliver')) $('btnDeliver').addEventListener('click', () => {
      if (!confirm('ส่งงานให้ลูกค้าแล้ว?')) return;
      doAction('deliver');
    });
  }

  async function doAction(action) {
    const id = state.job && state.job.id;
    if (!id) return;
    const btn = document.querySelector('#actions .btn');
    if (btn) { btn.disabled = true; btn.textContent = 'กำลังบันทึก...'; }
    const r = await api(`/api/tech/jobs/${encodeURIComponent(id)}/${action}`, { method: 'POST' });
    if (r.ok) await renderDetail();
    else { alert('ไม่สำเร็จ: ' + ((r.body && (r.body.error||r.body.message))||`HTTP ${r.status}`)); if (btn) btn.disabled = false; }
  }

  async function deletePhoto(idx) {
    const id = state.job && state.job.id;
    if (!id) return;
    updateSaveStatus('saving');
    const r = await api(`/api/tech/jobs/${encodeURIComponent(id)}/photos/${idx}`, { method: 'DELETE' });
    if (r.ok) { updateSaveStatus('saved'); await renderDetail(); }
    else { updateSaveStatus('error'); alert('ลบไม่สำเร็จ'); }
  }

  // QR Modal — ลูกค้าสแกนเพื่อติดตามงาน
  async function ensureQrLib() {
    if (typeof QRCode === 'undefined') {
      await new Promise(resolve => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js';
        s.onload = resolve;
        document.head.appendChild(s);
      });
    }
  }

  async function showCustomerQr(data, jobId) {
    await ensureQrLib();
    const ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:20px;cursor:pointer;';
    const lineOaUrl = data.line_oa_url || '';
    const innerHtml = `
      <div style="background:white;padding:24px;border-radius:16px;text-align:center;max-width:340px;" onclick="event.stopPropagation()">
        <h3 style="margin:0 0 12px;color:#0a8855;">📲 ลูกค้าสแกนเพื่อติดตามงาน</h3>
        <p style="font-size:13px;color:#666;margin-bottom:12px;line-height:1.5">สแกน QR นี้ → add LINE ร้าน → ระบบจะส่งสถานะงานให้อัตโนมัติ</p>
        <div id="custQrBox" style="display:flex;justify-content:center;margin:14px 0;"></div>
        <div style="font-family:monospace;font-size:14px;color:#0a8855;font-weight:bold;background:#f0fdf4;padding:8px;border-radius:8px;">${jobId}</div>
        <p style="font-size:11px;color:#999;margin-top:10px;">หรือพิมพ์ <b>${jobId}</b> ในแชต LINE OA</p>
        <button id="qrClose" style="margin-top:14px;padding:10px 24px;background:#0a8855;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer;">ปิด</button>
      </div>
    `;
    ov.innerHTML = innerHtml;
    ov.addEventListener('click', () => ov.remove());
    document.body.appendChild(ov);

    // สร้าง QR — ถ้ามี LINE OA URL → ใส่ลิงก์ LINE add friend, ถ้าไม่มี — ใช้ jobId ตรงๆ
    const qrText = lineOaUrl || jobId;
    new QRCode(document.getElementById('custQrBox'), { text: qrText, width: 220, height: 220, correctLevel: QRCode.CorrectLevel.M });
    document.getElementById('qrClose').addEventListener('click', () => ov.remove());
  }

  function debouncedSave(patch) {
    if (state.saveTimer) clearTimeout(state.saveTimer);
    updateSaveStatus('saving');
    state.saveTimer = setTimeout(() => saveJob(patch), 500);
  }

  async function saveJob(patch) {
    const id = state.job && state.job.id;
    if (!id) return;
    updateSaveStatus('saving');
    const r = await api(`/api/tech/jobs/${encodeURIComponent(id)}`, {
      method: 'PUT',
      body: JSON.stringify(patch),
    });
    if (r.ok) {
      updateSaveStatus('saved');
      if (r.body && (r.body.job || r.body.id)) {
        const updated = r.body.job || r.body;
        // merge gentle fields ที่ server คำนวณกลับมา (amount, commission_amount, parts_total)
        ['amount','commission_amount','parts_total','updated_at'].forEach(k => {
          if (updated[k] != null) state.job[k] = updated[k];
        });
      }
    } else {
      updateSaveStatus('error');
    }
  }

  function updateSaveStatus(s) {
    state.saveStatus = s;
    const el = $('saveStatus');
    if (!el) return;
    el.classList.remove('saving','saved','error');
    if (s === 'saving') { el.textContent = '💾 กำลังบันทึก...'; el.classList.add('saving'); }
    else if (s === 'saved') { el.textContent = '✓ บันทึกแล้ว'; el.classList.add('saved'); setTimeout(()=>{ if(el && state.saveStatus==='saved') el.textContent=''; }, 1500); }
    else if (s === 'error') { el.textContent = '⚠️ บันทึกไม่สำเร็จ'; el.classList.add('error'); }
    else el.textContent = '';
  }

  // ---------- Parts Picker ----------
  function openPartsPicker() {
    const sheet = document.createElement('div');
    sheet.className = 'sheet';
    sheet.innerHTML = `
      <div class="sheet-inner">
        <div class="sheet-header">
          <div class="title">เลือกอะไหล่</div>
          <button class="iconbtn" id="ppClose" style="background:#eee;color:#1a2e22;width:32px;height:32px;border-radius:8px;border:none;font-size:16px;cursor:pointer">✕</button>
        </div>
        <div style="padding:10px 12px 0">
          <input type="search" id="ppSearch" placeholder="🔍 ค้นหา SKU / ชื่อช่าง" autocomplete="off" />
        </div>
        <div class="sheet-body" id="ppBody">
          <div class="center"><div class="spinner"></div><div class="muted">กำลังโหลด...</div></div>
        </div>
        <div class="sheet-foot">
          <button class="btn btn-primary" id="ppDone">เสร็จสิ้น</button>
        </div>
      </div>
    `;
    document.body.appendChild(sheet);

    const close = () => sheet.remove();
    $('ppClose').addEventListener('click', close);
    $('ppDone').addEventListener('click', close);
    sheet.addEventListener('click', (e) => { if (e.target === sheet) close(); });

    let searchTimer = null;
    const doSearch = (q) => {
      if (searchTimer) clearTimeout(searchTimer);
      searchTimer = setTimeout(() => loadParts(q), 250);
    };

    async function loadParts(q) {
      const body = $('ppBody');
      body.innerHTML = `<div class="center"><div class="spinner"></div></div>`;
      const r = await api('/api/tech/products?q=' + encodeURIComponent(q || ''));
      if (!r.ok || !r.body) {
        body.innerHTML = `<div class="alert alert-error">โหลดอะไหล่ไม่สำเร็จ</div>`;
        return;
      }
      const items = r.body.products || r.body.data || r.body || [];
      state.productsCache = Array.isArray(items) ? items : [];
      renderList();
    }

    function renderList() {
      const body = $('ppBody');
      const items = state.productsCache;
      if (!items.length) {
        body.innerHTML = `<div class="muted center" style="padding:20px">ไม่พบอะไหล่</div>`;
        return;
      }
      body.innerHTML = items.map(p => {
        const name = p.name_tech || p.name || '-';
        const sku = p.sku || '';
        const price = Number(p.repair_price != null ? p.repair_price : p.price) || 0;
        const stock = p.stock != null ? p.stock : (p.qty_in_stock != null ? p.qty_in_stock : '-');
        const pid = p.id || p.product_id || sku;
        return `
          <div class="part-item" data-id="${escapeHtml(pid)}">
            <div class="pname">${escapeHtml(name)}</div>
            <div class="psku">${escapeHtml(sku)}</div>
            <div class="prow">
              <div class="price">${fmtMoney(price)}</div>
              <div class="stock">stock: ${escapeHtml(String(stock))}</div>
              <input type="number" class="qty-input" value="1" min="1" />
              <button class="btn btn-primary add-btn">+ เพิ่ม</button>
            </div>
          </div>`;
      }).join('');

      $$('#ppBody .part-item').forEach(el => {
        el.querySelector('.add-btn').addEventListener('click', () => {
          const pid = el.dataset.id;
          const qty = Math.max(1, +el.querySelector('.qty-input').value || 1);
          const prod = items.find(x => String(x.id||x.product_id||x.sku) === String(pid));
          if (!prod) return;
          addPart(prod, qty);
          // visual feedback
          el.style.background = '#d8f0d8';
          setTimeout(() => { el.style.background = ''; }, 400);
        });
      });
    }

    $('ppSearch').addEventListener('input', (e) => doSearch(e.target.value));
    loadParts('');
  }

  function addPart(prod, qty) {
    const j = state.job;
    if (!j) return;
    const unit = Number(prod.repair_price != null ? prod.repair_price : prod.price) || 0;
    const item = {
      product_id: prod.id || prod.product_id || null,
      sku: prod.sku || '',
      name_tech: prod.name_tech || prod.name || '',
      qty: qty,
      unit_price: unit,
      total: unit * qty,
    };
    const list = Array.isArray(j.parts_used) ? j.parts_used.slice() : [];
    // ถ้ามี product_id ซ้ำ → รวม qty
    const existIdx = list.findIndex(x => x.product_id && item.product_id && x.product_id === item.product_id);
    if (existIdx >= 0) {
      list[existIdx].qty = (Number(list[existIdx].qty)||0) + qty;
      list[existIdx].total = (Number(list[existIdx].unit_price)||unit) * list[existIdx].qty;
    } else {
      list.push(item);
    }
    j.parts_used = list;
    saveJob({ parts_used: list }).then(() => drawDetail());
  }

  // ---------- PWA install prompt ----------
  let deferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    // แสดงปุ่มติดตั้งบน topbar (Android/Chrome)
    setTimeout(showInstallBanner, 2000);
  });

  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches ||
           window.navigator.standalone === true;
  }

  function showInstallBanner() {
    if (isStandalone()) return; // ติดตั้งแล้ว
    if (sessionStorage.getItem('installBannerDismissed')) return;

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isAndroid = /Android/.test(navigator.userAgent);
    if (!deferredInstallPrompt && !isIOS) return;

    const banner = document.createElement('div');
    banner.id = 'installBanner';
    banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#0a8855;color:white;padding:12px 14px;display:flex;align-items:center;gap:10px;z-index:9999;box-shadow:0 -2px 12px rgba(0,0,0,0.2);font-size:14px;';
    if (isIOS) {
      banner.innerHTML = `
        <div style="flex:1;line-height:1.4">
          📲 ติดแอปไว้ที่หน้าจอหลัก<br>
          <small style="opacity:0.9">กด <b>⬆︎ Share</b> → <b>เพิ่มไปยัง Home Screen</b></small>
        </div>
        <button id="banClose" style="background:rgba(255,255,255,0.2);color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer">✕</button>
      `;
    } else {
      banner.innerHTML = `
        <div style="flex:1;line-height:1.4">
          📲 ติด KKT SERVICE ไว้ที่หน้าจอหลัก
        </div>
        <button id="banInstall" style="background:white;color:#0a8855;border:none;padding:8px 14px;border-radius:6px;font-weight:600;cursor:pointer">ติดตั้ง</button>
        <button id="banClose" style="background:rgba(255,255,255,0.2);color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer">✕</button>
      `;
    }
    document.body.appendChild(banner);
    document.getElementById('banClose').addEventListener('click', () => {
      banner.remove();
      sessionStorage.setItem('installBannerDismissed', '1');
    });
    const btnInstall = document.getElementById('banInstall');
    if (btnInstall) {
      btnInstall.addEventListener('click', async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        const choice = await deferredInstallPrompt.userChoice;
        if (choice.outcome === 'accepted') banner.remove();
        deferredInstallPrompt = null;
      });
    }
  }

  // ---------- LINE in-app browser detection ----------
  function isLineInAppBrowser() {
    return /Line\//i.test(navigator.userAgent || '');
  }
  function escapeFromLineBrowser() {
    // LINE จะเด้งออก default browser ถ้าเจอ query param openExternalBrowser=1
    const url = new URL(location.href);
    if (!url.searchParams.has('openExternalBrowser')) {
      url.searchParams.set('openExternalBrowser', '1');
      location.replace(url.toString());
      return true;
    }
    return false;
  }

  function showInAppBrowserWarning() {
    topbar.innerHTML = '';
    root.innerHTML = `
      <div class="card center">
        <div class="big-emoji">⚠️</div>
        <h3 style="margin:6px 0">ไม่รองรับ LINE in-app browser</h3>
        <p class="muted" style="margin:8px 0 14px">KKT SERVICE ต้องเปิดใน Safari / Chrome เพื่อให้ใช้งานสะดวก (ถ่ายรูป + LINE Login)</p>
        <p style="font-size:14px;color:#3a5547;line-height:1.6">
          1. กดปุ่ม <b>⋮</b> มุมขวาบน<br>
          2. เลือก <b>"เปิดใน Browser อื่น"</b> / <b>"Open in browser"</b>
        </p>
      </div>`;
  }

  // ---------- Init ----------
  async function init() {
    // 0) ถ้าอยู่ใน LINE in-app browser → เด้งออก Safari/Chrome
    if (isLineInAppBrowser()) {
      if (escapeFromLineBrowser()) return;
      // ถ้ายังอยู่ in-app browser → แสดงคำแนะนำ
      showInAppBrowserWarning();
      return;
    }

    // 1) auth
    const me = await api('/auth/me');
    if (me.status === 401 || !me.ok) {
      const next = encodeURIComponent(location.pathname + location.search);
      location.href = '/auth/login?next=' + next;
      return;
    }
    state.user = (me.body && (me.body.user || me.body)) || null;
    const role = state.user && state.user.role;
    if (role !== 'technician' && role !== 'owner' && role !== 'manager') {
      showNoPerm('ระบบนี้สำหรับช่างเท่านั้น');
      return;
    }

    // 2) /api/tech/me
    const t = await api('/api/tech/me');
    if (!t.ok) {
      showError('โหลดข้อมูลช่างไม่สำเร็จ: ' + ((t.body && (t.body.error||t.body.message)) || `HTTP ${t.status}`), () => init());
      return;
    }
    state.me = t.body || {};

    // 2.5) ตรวจว่าช่าง check_in วันนี้แล้วหรือยัง — ถ้ายังไม่ → บังคับไปหน้า attendance scan
    if (state.user && state.user.role === 'technician') {
      try {
        const sumRes = await api('/api/tech/today-summary');
        if (sumRes.ok && sumRes.body && !sumRes.body.first_in) {
          // ยังไม่ได้ลงเวลาเข้างานวันนี้
          location.href = '/attendance/scan?type=check_in';
          return;
        }
      } catch (_) { /* ignore — ไปต่อ dashboard */ }
    }

    // 3) dashboard
    navigate('dashboard');

    // 4) iOS → แสดงหินต์ติดแอป (beforeinstallprompt ไม่มีบน iOS)
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (isIOS && !isStandalone()) {
      setTimeout(showInstallBanner, 3000);
    }
  }

  init().catch(err => {
    console.error(err);
    showError('เริ่มระบบไม่สำเร็จ: ' + (err.message || err), () => init());
  });
})();
</script>
